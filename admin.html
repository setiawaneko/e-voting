<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - E-Voting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Panel Admin & <span class="text-red-600">Anti-Fraud</span></h1>
                <p class="text-gray-500">Pemantauan hasil suara secara real-time</p>
            </div>
            <button onclick="clearData()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm transition">Reset Data</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-xl shadow">
                    <h2 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Total Suara Masuk</h2>
                    <p id="total-votes" class="text-5xl font-black text-blue-600">0</p>
                </div>
                <div class="bg-white p-6 rounded-xl shadow border-l-4 border-yellow-400">
                    <h2 class="text-gray-500 text-xs font-bold uppercase tracking-wider">Potensi Kecurangan</h2>
                    <p id="fraud-count" class="text-5xl font-black text-yellow-600">0</p>
                    <p class="text-xs text-gray-400 mt-2">*Berdasarkan kesamaan perangkat (device fingerprint)</p>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow">
                <h2 class="text-gray-800 font-bold mb-4">Visualisasi Perolehan Suara</h2>
                <div class="h-[250px]">
                    <canvas id="voteChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow overflow-hidden">
            <div class="p-4 border-b">
                <h2 class="font-bold text-gray-700">Audit Log (Data Mentah)</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-100 text-gray-600 text-sm">
                        <tr>
                            <th class="px-6 py-3 font-semibold">NISN</th>
                            <th class="px-6 py-3 font-semibold">Pilihan</th>
                            <th class="px-6 py-3 font-semibold">Waktu</th>
                            <th class="px-6 py-3 font-semibold">Browser Fingerprint</th>
                        </tr>
                    </thead>
                    <tbody id="log-table" class="divide-y divide-gray-200 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let myChart;

        function initChart(dataKandidat) {
            const ctx = document.getElementById('voteChart').getContext('2d');
            
            // Hapus chart lama jika ada (untuk re-render)
            if (myChart) { myChart.destroy(); }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Kandidat 01', 'Kandidat 02'],
                    datasets: [{
                        label: 'Jumlah Suara',
                        data: [dataKandidat['Kandidat 01'] || 0, dataKandidat['Kandidat 02'] || 0],
                        backgroundColor: ['rgba(59, 130, 246, 0.6)', 'rgba(34, 197, 94, 0.6)'],
                        borderColor: ['#3b82f6', '#22c55e'],
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                }
            });
        }

        function loadAdminData() {
            const votes = JSON.parse(localStorage.getItem('votes') || "[]");
            const table = document.getElementById('log-table');
            const totalVotesText = document.getElementById('total-votes');
            const fraudCountText = document.getElementById('fraud-count');

            totalVotesText.innerText = votes.length;
            table.innerHTML = "";
            
            let voteCount = { 'Kandidat 01': 0, 'Kandidat 02': 0 };
            let deviceTracker = {}; // Untuk deteksi kecurangan
            let frauds = 0;

            votes.forEach(v => {
                // Hitung perolehan untuk grafik
                voteCount[v.choice] = (voteCount[v.choice] || 0) + 1;

                // Deteksi Fraud: Jika 1 browser (fingerprint) dipakai lebih dari 1x
                if (deviceTracker[v.browser]) {
                    frauds++;
                } else {
                    deviceTracker[v.browser] = true;
                }

                const row = `<tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 font-mono font-bold">${v.nisn}</td>
                    <td class="px-6 py-4">
                        <span class="${v.choice === 'Kandidat 01' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'} px-2 py-1 rounded-md text-xs font-bold">
                            ${v.choice}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-gray-500">${v.timestamp}</td>
                    <td class="px-6 py-4 text-xs text-gray-400 truncate max-w-[150px]">${v.browser}</td>
                </tr>`;
                table.innerHTML += row;
            });

            fraudCountText.innerText = frauds;
            initChart(voteCount);
        }

        function clearData() {
            if(confirm("PERINGATAN: Hapus semua data hasil suara dan reset sistem?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = loadAdminData;
    </script>
</body>
</html>
